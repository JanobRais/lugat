<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lugat – So'z boyligini oshiring</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="lugat-data.jsx"></script>
<script type="text/babel" src="lugat-home.jsx"></script>
<script type="text/babel" src="lugat-learn.jsx"></script>
<script type="text/babel" src="lugat-test.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1a1a2e; font-family: 'Plus Jakarta Sans', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #1e3a5f 0%, #0d1117 70%); }
  ::-webkit-scrollbar { width: 0; }

  @keyframes lugat-shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  @keyframes lugat-fadeIn {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes lugat-slideUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ── Bottom Nav Icon SVGs ─────────────────────────────────
const NAV_ICONS = {
  home: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M3 9.5L12 3l9 6.5V21H15v-5h-6v5H3V9.5z"
        fill={active ? C.primary : 'none'}
        stroke={active ? C.primary : C.onSurfaceVariant}
        strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>
  ),
  learn: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8" strokeLinecap="round"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"
        fill={active ? C.primaryContainer : 'none'}
        stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
      <line x1="8" y1="7" x2="16" y2="7" stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.5" strokeLinecap="round"/>
      <line x1="8" y1="11" x2="14" y2="11" stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  ),
  flashcard: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="6" width="20" height="13" rx="2.5"
        fill={active ? C.primaryContainer : 'none'}
        stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
      <rect x="5" y="3" width="14" height="13" rx="2.5"
        fill={active ? '#fff' : 'none'}
        stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
      <line x1="8" y1="9" x2="16" y2="9" stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.5" strokeLinecap="round"/>
      <line x1="8" y1="13" x2="13" y2="13" stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  ),
  stats: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="12" width="4" height="9" rx="1"
        fill={active ? C.primary : 'none'} stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
      <rect x="10" y="7" width="4" height="14" rx="1"
        fill={active ? C.primary : 'none'} stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
      <rect x="17" y="3" width="4" height="18" rx="1"
        fill={active ? C.primary : 'none'} stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
    </svg>
  ),
  settings: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3"
        fill={active ? C.primaryContainer : 'none'}
        stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
        stroke={active ? C.primary : C.onSurfaceVariant} strokeWidth="1.8"/>
    </svg>
  ),
};

const NAV_TABS = [
  { key:'home',      label:'Bosh',     icon:NAV_ICONS.home      },
  { key:'learn',     label:"O'rganish", icon:NAV_ICONS.learn     },
  { key:'flashcard', label:'Kartalar', icon:NAV_ICONS.flashcard  },
  { key:'stats',     label:'Natijalar', icon:NAV_ICONS.stats     },
  { key:'settings',  label:'Sozlamalar',icon:NAV_ICONS.settings  },
];

// ── Bottom Navigation ───────────────────────────────────────
function BottomNav({ active, onSelect }) {
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      background:'rgba(244,251,248,0.97)',
      backdropFilter:'blur(12px)',
      borderTop:`1px solid ${C.outlineVariant}`,
      display:'flex', padding:'6px 0 2px', zIndex:100,
    }}>
      {NAV_TABS.map(t => {
        const isActive = active === t.key;
        return (
          <div key={t.key} onClick={()=>onSelect(t.key)} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center',
            gap:3, cursor:'pointer', padding:'4px 0',
            userSelect:'none',
          }}>
            <div style={{
              padding:'4px 16px', borderRadius:99,
              background: isActive ? C.primaryContainer : 'transparent',
              transition:'background .2s',
            }}>
              {t.icon(isActive)}
            </div>
            <span style={{
              fontSize:10, fontWeight: isActive ? 700 : 500,
              color: isActive ? C.primary : C.onSurfaceVariant,
              transition:'color .2s',
            }}>{t.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── Screen Wrapper with fade transition ─────────────────────
function ScreenWrap({ children, screenKey }) {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    setVisible(false);
    const t = setTimeout(() => setVisible(true), 30);
    return () => clearTimeout(t);
  }, [screenKey]);

  return (
    <div style={{
      height:'100%', overflowY:'auto', overflowX:'hidden',
      opacity: visible ? 1 : 0,
      transform: visible ? 'none' : 'translateY(6px)',
      transition:'opacity .22s ease, transform .22s ease',
    }}>
      {children}
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────
function LugatApp() {
  const [screen, setScreen] = React.useState('home');
  const [prevScreen, setPrevScreen] = React.useState(null);

  // Only 4 of 5 tabs are "main"; flashcard is accessed via home/learn
  const mainTabs = ['home','learn','stats','settings'];
  const activeTab = mainTabs.includes(screen) ? screen : (prevScreen || 'home');

  function navigate(to) {
    setPrevScreen(mainTabs.includes(screen) ? screen : prevScreen);
    setScreen(to);
  }

  function navTab(tab) {
    setPrevScreen(tab);
    setScreen(tab);
  }

  const screenEl = (() => {
    switch(screen) {
      case 'home':      return <HomeScreen      onNavigate={navigate} />;
      case 'learn':     return <LearnScreen     onNavigate={navigate} />;
      case 'flashcard': return <FlashcardScreen onNavigate={navigate} />;
      case 'test':      return <TestScreen      onNavigate={navigate} />;
      case 'stats':     return <StatsScreen />;
      case 'settings':  return <SettingsScreen />;
      default:          return <HomeScreen      onNavigate={navigate} />;
    }
  })();

  return (
    <AndroidDevice width={393} height={852} title={undefined}>
      <div style={{ height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>
        <ScreenWrap screenKey={screen}>
          {screenEl}
        </ScreenWrap>
        {/* Bottom nav only on main tabs and learn-related screens */}
        {screen !== 'test' && (
          <BottomNav
            active={activeTab}
            onSelect={navTab}
          />
        )}
      </div>
    </AndroidDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LugatApp/>);
</script>
</body>
</html>
